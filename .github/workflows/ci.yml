name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            zig/zig-cache
            zig/.zig-cache
          key: ${{ runner.os }}-zig-${{ hashFiles('zig/build.zig', 'zig/build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Zig tests
        run: cd zig && zig build test

      - name: Rust tests
        run: cd rust && cargo test --workspace

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl tools
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Cache Cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Cache Zig
        uses: actions/cache@v4
        with:
          path: |
            zig/zig-cache
            zig/.zig-cache
          key: ${{ runner.os }}-zig-${{ hashFiles('zig/build.zig', 'zig/build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Build Zig
        run: cd zig && zig build

      - name: Build Rust
        run: cd rust && cargo build --release
