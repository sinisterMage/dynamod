# /etc/dynamod/logind.conf — configuration for dynamod-logind.
#
# Drop-in compatible with the subset of systemd-logind(8) keys that dynamod
# implements. Lines beginning with '#' or ';' are comments. Reload with
# `kill -HUP $(pidof dynamod-logind)` or by restarting the service.

[Login]

# Action when a power/sleep/hibernate key is pressed.
# Values: ignore, poweroff, reboot, halt, suspend, hibernate, hybrid-sleep, lock.
#HandlePowerKey=poweroff
#HandleSuspendKey=suspend
#HandleHibernateKey=hibernate

# Lid switch actions. *ExternalPower is used when on AC; *Docked when the
# laptop is docked (with an external monitor).
#HandleLidSwitch=suspend
#HandleLidSwitchExternalPower=suspend
#HandleLidSwitchDocked=ignore

# Number of autospawned VTs (informational; dynamod doesn't autospawn VTs).
#NAutoVTs=6

# Maximum time (seconds) we wait for delay-inhibitors before suspend/shutdown.
#InhibitDelayMaxSec=5

# Grace period after the last session closes before /run/user/$UID is removed.
#UserStopDelaySec=10

# After resume / boot, ignore lid events for this many seconds.
#HoldoffTimeoutSec=30

# tmpfs size for /run/user/$UID. Accepts the same syntax as mount -o size=.
#RuntimeDirectorySize=10%

# Whether to kill all of a user's processes when they log out.
#KillUserProcesses=no
