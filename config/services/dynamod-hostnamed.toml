[service]
name = "dynamod-hostnamed"
supervisor = "desktop"
exec = ["/usr/lib/dynamod/dynamod-hostnamed"]
type = "notify"

[restart]
policy = "permanent"
delay = "1s"
max-restarts = 5
max-restart-window = "60s"

[readiness]
type = "notify"
timeout = "10s"

[dependencies]
requires = ["dbus"]
after = ["dbus"]

[shutdown]
stop-signal = "SIGTERM"
stop-timeout = "5s"
